<header class="fixed top-0 left-0 right-0 z-50 border-b border-white/10 bg-black/75 backdrop-blur-2xl">
  <nav class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
    <a routerLink="/" fragment="inicio" class="font-display text-xl sm:text-2xl tracking-widest text-white">
      DINU<span class="text-white/70">BARBERSHOP</span>
    </a>

    <button
      class="md:hidden rounded-lg border border-white/30 p-2 text-white"
      aria-label="Abrir menú"
      (click)="toggleMenu()">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>

    <ul class="hidden items-center gap-8 text-sm uppercase tracking-[0.18em] md:flex">
      <li><a routerLink="/" fragment="inicio" class="text-white/80 transition hover:text-white">Inicio</a></li>
      <li><a routerLink="/" fragment="servicios" class="text-white/80 transition hover:text-white">Servicios</a></li>
      <li>
        <a href="https://www.instagram.com/dinubarbershop/" target="_blank" rel="noopener noreferrer" class="text-white/80 transition hover:text-white">
          Instagram
        </a>
      </li>
      <li><a routerLink="/" fragment="contacto" class="text-white/80 transition hover:text-white">Contacto</a></li>
      <li><a routerLink="/ubicacion" class="text-white/80 transition hover:text-white">Dónde estamos</a></li>
    </ul>
  </nav>

  <div *ngIf="menuOpen" class="border-t border-white/10 bg-black px-6 pb-5 pt-4 md:hidden">
    <ul class="space-y-3 text-sm uppercase tracking-wider">
      <li><a routerLink="/" fragment="inicio" class="block text-white/85" (click)="closeMenu()">Inicio</a></li>
      <li><a routerLink="/" fragment="servicios" class="block text-white/85" (click)="closeMenu()">Servicios</a></li>
      <li>
        <a href="https://www.instagram.com/dinubarbershop/" target="_blank" rel="noopener noreferrer" class="block text-white/85" (click)="closeMenu()">
          Instagram
        </a>
      </li>
      <li><a routerLink="/" fragment="contacto" class="block text-white/85" (click)="closeMenu()">Contacto</a></li>
      <li><a routerLink="/ubicacion" class="block text-white/85" (click)="closeMenu()">Dónde estamos</a></li>
    </ul>
  </div>
</header>
